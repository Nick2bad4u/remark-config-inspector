# ===============================================================================
# SonarCloud Configuration for Stylelint-Config-Inspector
# ===============================================================================

# Project identification
sonar.organization=nick2bad4u
sonar.projectKey=Nick2bad4u_Stylelint-Config-Inspector
sonar.projectName=Stylelint-Config-Inspector

# SonarCloud server configuration
sonar.host.url=https://sonarcloud.io

# ===============================================================================
# SOURCE CONFIGURATION
# ===============================================================================

# Main source directories (production code only)
sonar.sources=src

# Non-production code mapped as test sources to avoid strict production rules
sonar.tests=test,benchmark,benchmarks,scripts,docs

# Ensure non-production files are excluded from the main source analysis just in case
sonar.exclusions=**/.github/**,**/node_modules/**,**/dist/**,**/coverage/**,**/build/**,**/temp/**,**/*.config.*,**/*.d.ts,**/*.d.mts,eslint.config.mjs,commitlint.config.mjs,stryker.config.mjs,stylelint.config.mjs

# Exclude non-production code from duplication analysis
sonar.cpd.exclusions=**/test/**,**/tests/**,**/benchmark/**,**/benchmarks/**,**/scripts/**,**/docs/**

# Map these folders to the test analyzer so they are not flagged for production-level issues
sonar.test.inclusions=**/test/**,**/tests/**,**/benchmark/**,**/benchmarks/**,**/scripts/**,**/docs/**

# Disable completely for fixtures, snapshots, etc. which contain intentionally invalid code
sonar.test.exclusions=**/test/fixtures/**,**/snapshots/**,**/docs/docusaurus/**,**/docs/rules/**

# ===============================================================================
# LANGUAGE AND FILE TYPE CONFIGURATION
# ===============================================================================

sonar.typescript.file.suffixes=.ts,.tsx,.mts,.cts
sonar.javascript.file.suffixes=.js,.jsx,.mjs,.cjs

# Link to tsconfig
sonar.typescript.tsconfigPaths=tsconfig.json

# ===============================================================================
# CODE COVERAGE CONFIGURATION
# ===============================================================================

sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Ensure no coverage expectations on test files or non-prod folders
sonar.coverage.exclusions=**/test/**,**/benchmark/**,**/benchmarks/**,**/scripts/**,**/docs/**,**/.github/**,**/*.config.*,**/*.d.ts,**/*.d.mts,eslint.config.mjs

# ===============================================================================
# CODE ANALYSIS CONFIGURATION
# ===============================================================================

sonar.sourceEncoding=UTF-8
sonar.scm.provider=git

# Treat bundle logic as test/generated logic for scripts if needed
sonar.javascript.detectBundles=true

# Wait for Quality Gate
sonar.qualitygate.wait=true
