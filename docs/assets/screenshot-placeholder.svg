<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Stylelint Config Inspector screenshot placeholder</title>
  <desc id="desc">Placeholder graphic indicating where to add a real Stylelint Config Inspector UI screenshot.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d1b4d" />
      <stop offset="100%" stop-color="#4c1d95" />
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="url(#bg)" rx="24" ry="24" />
  <rect x="80" y="80" width="1120" height="560" fill="#111827" opacity="0.88" rx="20" ry="20" />
  <text x="640" y="320" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="44" fill="#f9fafb" font-weight="700">
    Stylelint Config Inspector
  </text>
  <text x="640" y="376" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" fill="#d1d5db">
    Screenshot placeholder
  </text>
  <text x="640" y="430" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" fill="#a78bfa">
    Replace this file with a real product screenshot.
  </text>
</svg>
