name: CI
concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

run-name: CI - Triggered by ${{ github.triggering_actor }}

on:
    push:
        branches:
            - main

    pull_request:
        branches:
            - main

    workflow_dispatch:

permissions:
    contents: read

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
              with:
                  egress-policy: audit

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set node
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: .node-version
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install
              run: npm install --force

            - name: Lint
              run: npm run lint

            - name: Typecheck
              run: npm run typecheck

    test:
        runs-on: ${{ matrix.os }}

        env:
            CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

        strategy:
            matrix:
                node: [lts/*, 25, 24, 22, 20]
                os: [ubuntu-latest, windows-latest, macos-latest]
            fail-fast: false

        defaults:
            run:
                shell: bash

        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
              with:
                  egress-policy: audit

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set node ${{ matrix.node }}
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: ${{ matrix.node }}
                  cache: npm

            - name: Install
              run: npm install --force

            - name: Build
              run: npm run build

            - name: Test
              if: matrix.node != 'lts/*'
              run: npm run test

            - name: Run tests with coverage and JUnit report
              if: matrix.node == 'lts/*'
              run: npx vitest run --coverage --reporter=github-actions --reporter=dot --reporter=junit --outputFile=test-report.junit.xml --silent
              env:
                  CI: "true"
                  MAX_THREADS: "1"
                  TYPEFEST_VITEST_HANGING_PROCESS_REPORTER: "true"
                  VITEST_HANGING_PROCESS_REPORTER: "true"

            - name: Verify coverage artifact
              if: matrix.node == 'lts/*'
              run: python -c "from pathlib import Path; assert Path('coverage/clover.xml').is_file(), 'coverage/clover.xml was not generated'"

            - name: Verify JUnit artifact
              if: matrix.node == 'lts/*'
              run: python -c "from pathlib import Path; assert Path('test-report.junit.xml').is_file(), 'test-report.junit.xml was not generated'"

            - name: Upload test results to Codecov
              if: "!cancelled() && matrix.node == 'lts/*' && env.CODECOV_TOKEN != ''"
              uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
              with:
                  token: ${{ env.CODECOV_TOKEN }}
                  slug: Nick2bad4u/stylelint-config-inspector
                  files: test-report.junit.xml
                  flags: ${{ matrix.os == 'ubuntu-latest' && 'os-linux' || matrix.os == 'windows-latest' && 'os-windows' || 'os-macos' }}
                  name: vitest-junit-${{ matrix.os == 'ubuntu-latest' && 'os-linux' || matrix.os == 'windows-latest' && 'os-windows' || 'os-macos' }}
                  report_type: test_results
                  fail_ci_if_error: true
                  disable_search: true
                  verbose: true

            - name: Upload coverage to Codecov
              if: "!cancelled() && matrix.node == 'lts/*' && env.CODECOV_TOKEN != ''"
              uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
              with:
                  token: ${{ env.CODECOV_TOKEN }}
                  slug: Nick2bad4u/stylelint-config-inspector
                  files: ./coverage/clover.xml
                  flags: ${{ matrix.os == 'ubuntu-latest' && 'os-linux' || matrix.os == 'windows-latest' && 'os-windows' || 'os-macos' }}
                  name: vitest-unit-coverage-${{ matrix.os == 'ubuntu-latest' && 'os-linux' || matrix.os == 'windows-latest' && 'os-windows' || 'os-macos' }}
                  report_type: coverage
                  fail_ci_if_error: true
                  disable_search: true
                  verbose: true
