name: CI
concurrency:
    group: ci-${{ github.ref }}
    cancel-in-progress: true

run-name: CI - Triggered by ${{ github.triggering_actor }}

on:
    push:
        branches:
            - main

    pull_request:
        branches:
            - main

    workflow_dispatch:

permissions:
    contents: read

jobs:
    lint:
        runs-on: ubuntu-latest
        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
              with:
                  egress-policy: audit

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set node
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version-file: .node-version
                  cache: npm
                  cache-dependency-path: package-lock.json

            - name: Install
              run: npm install --force

            - name: Lint
              run: npm run lint

            - name: Typecheck
              run: npm run typecheck

    test:
        runs-on: ${{ matrix.os }}
        permissions:
            contents: read
            id-token: write

        env:
            CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

        strategy:
            matrix:
                node: [lts/*, 25, 24, 22, 20]
                os: [ubuntu-latest, windows-latest, macos-latest]
            fail-fast: false

        defaults:
            run:
                shell: bash

        steps:
            - name: Harden the runner (Audit all outbound calls)
              uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc # v2.15.1
              with:
                  egress-policy: audit

            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set node ${{ matrix.node }}
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  node-version: ${{ matrix.node }}
                  cache: npm

            - name: Install
              run: npm install --force

            - name: Compute Codecov flags
              id: codecov_flags
              run: |
                  if [[ "${{ matrix.os }}" == 'ubuntu-latest' ]]; then
                    codecov_os_flag='os-linux'
                  elif [[ "${{ matrix.os }}" == 'windows-latest' ]]; then
                    codecov_os_flag='os-windows'
                  else
                    codecov_os_flag='os-macos'
                  fi

                  if [[ "${{ matrix.node }}" == 'lts/*' ]]; then
                    codecov_node_flag='node-lts'
                  else
                    codecov_node_flag="node-${{ matrix.node }}"
                  fi

                  echo "os_flag=${codecov_os_flag}" >> "$GITHUB_OUTPUT"
                  echo "test_results_flag=${codecov_os_flag}-${codecov_node_flag}" >> "$GITHUB_OUTPUT"

            - name: Build
              run: npm run build

            - name: Clean test report outputs
              if: ${{ !cancelled() }}
              run: rm -rf coverage test-report.junit.xml

            - name: Test
              if: matrix.node != 'lts/*'
              run: npx vitest run --reporter=github-actions --reporter=dot --reporter=junit --outputFile=test-report.junit.xml --silent
              env:
                  CI: "true"
                  MAX_THREADS: "1"
                  TYPEFEST_VITEST_HANGING_PROCESS_REPORTER: "true"
                  VITEST_HANGING_PROCESS_REPORTER: "true"

            - name: Run tests with coverage and JUnit report
              if: matrix.node == 'lts/*'
              run: npx vitest run --coverage --coverage.reporter=lcovonly --reporter=github-actions --reporter=dot --reporter=junit --outputFile=test-report.junit.xml --silent
              env:
                  CI: "true"
                  MAX_THREADS: "1"
                  TYPEFEST_VITEST_HANGING_PROCESS_REPORTER: "true"
                  VITEST_HANGING_PROCESS_REPORTER: "true"

            - name: Verify coverage artifact
              if: matrix.node == 'lts/*'
              run: python -c "from datetime import datetime, timedelta, timezone; from pathlib import Path; artifact = Path('coverage/lcov.info'); assert artifact.is_file(), 'coverage/lcov.info was not generated'; modified_at = datetime.fromtimestamp(artifact.stat().st_mtime, tz=timezone.utc); assert modified_at > datetime.now(timezone.utc) - timedelta(minutes=30), 'coverage/lcov.info is stale (older than 30 minutes)'; content = artifact.read_text(encoding='utf-8'); assert len(content.strip()) > 0, 'coverage/lcov.info is empty'; assert 'SF:' in content, 'coverage/lcov.info has no source file entries'"

            - name: Upload Nuxt bundle analysis to Codecov
              if: ${{ matrix.node == 'lts/*' && matrix.os == 'ubuntu-latest' && (github.event_name == 'pull_request' || (github.event_name == 'push' && github.ref == 'refs/heads/main')) }}
              run: npx @codecov/bundle-analyzer ./dist --bundle-name=nuxt
              env:
                  GITHUB_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
                  GITHUB_REF: ${{ github.event_name == 'pull_request' && format('refs/heads/{0}', github.head_ref) || github.ref }}

            - name: Verify JUnit artifact
              if: ${{ !cancelled() }}
              run: python -c "from pathlib import Path; assert Path('test-report.junit.xml').is_file(), 'test-report.junit.xml was not generated'"

            - name: Upload test results to Codecov
              if: ${{ !cancelled() }}
              uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
              with:
                  use_oidc: true
                  slug: Nick2bad4u/remark-config-inspector
                  files: test-report.junit.xml
                  flags: ${{ steps.codecov_flags.outputs.test_results_flag }}
                  name: vitest-junit-${{ steps.codecov_flags.outputs.test_results_flag }}
                  report_type: test_results
                  fail_ci_if_error: true
                  disable_search: true
                  verbose: true

            - name: Upload coverage to Codecov
              if: ${{ !cancelled() && matrix.node == 'lts/*' }}
              uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
              with:
                  use_oidc: true
                  slug: Nick2bad4u/remark-config-inspector
                  files: ./coverage/lcov.info
                  flags: ${{ steps.codecov_flags.outputs.os_flag }}
                  name: vitest-unit-coverage-${{ steps.codecov_flags.outputs.os_flag }}
                  report_type: coverage
                  fail_ci_if_error: true
                  disable_search: true
                  verbose: true
